<script>
function lw_dash_overlay(parent) {
	/* Overlay element */
	const overlay_e = document.createElement('div');

	overlay_e.className = 'overlay overlay_bg'; 

	/* Append the overlay to parent */
	parent.appendChild(overlay_e);

	/* Remove with animation */
	function remove() {		
		/* Add the fade-out animation class */
		overlay_e.classList.add('overlay_fade_out');

		/* Listen for the animation end event */
		overlay_e.addEventListener('animationend', function handler() {
			if (overlay_e.parentNode) {
				overlay_e.parentNode.removeChild(overlay_e);
			}

			/* Remove the event listener to prevent memory leaks */
			overlay_e.removeEventListener('animationend', handler);
		});
	}

	return {
		self: overlay_e,

		/* methods */
		remove: remove
	}
}

</script>

<script>
let lw_dash_hint_mode = false;

/** Creates a cloned element which mimics original element
    appearence and position, but lies within another parent.
    The original element is hidden unless delete() method is called.
    The impostor element is not linked with the original, thus any
    updates won't be transfered after one has been created. */
function lw_dash_hint_mode_impostor(element, parent) {
	/* 1. Store original visibility style to restore later */
	const original_visibility = element.style.visibility;

	/* 2. Clone the original element (deep clone to include children) */
	const cloned = element.cloneNode(true);

	/* 3. Hide the original element (preserving its space in the layout) */
	element.style.visibility = 'hidden';

	/* 4. Remove any ID to prevent duplicate IDs in the DOM */
	cloned.removeAttribute('id');

	/* 5. Append the clone to the specified target parent */
	parent.appendChild(cloned);

	/* 6. Track original element position */
	const position_tracker = setInterval(function() {
		const rect = element.getBoundingClientRect();
		cloned.style.top = rect.top + 'px';
		cloned.style.left = rect.left + 'px';

		cloned.style.position  = 'fixed';
		cloned.style.width  = `${rect.width}px`;
		cloned.style.height = `${rect.height}px`;
		cloned.style.margin = 0;
	}, 0);


	/* 7. Return an object with the remove and a reference to the clone */
	return {
		remove: function() {
			cloned.parentNode.removeChild(cloned);
	
			/* Restore the original element's visibility */
			element.style.visibility = original_visibility;

			/* Stop position tracker */
			clearInterval(position_tracker);
		},
	
		self: cloned
	};
}

function lw_dash_hint_mode_enter(parent)
{
	lw_dash_hint_mode = true;

	const items = document.querySelectorAll('[data-hint]');

	/* Create impostor for each item */
	items.forEach(item => {
		item.impostor = lw_dash_hint_mode_impostor(item, parent);
		item.impostor.self.onclick  = item.hint_click_action;
		item.impostor.self.classList.add('hint');

		/* Impostor should not have hint property
		   This prevents from false enumeration when removing hints */
		delete item.impostor.self.dataset.hint;
	});
}

function lw_dash_hint_mode_exit()
{
	lw_dash_hint_mode = false;

	const items = document.querySelectorAll('[data-hint]');

	/* Remove all impostors */	
	items.forEach((item, index) => {
		item.impostor.remove();
		delete item.impostor;
	});
}

function lw_dash_hint_mode_toggle() {
	if (!lw_dash_hint_mode)
		lw_dash_hint_mode_enter();
	else
		lw_dash_hint_mode_exit();
}

function lw_dash_hint_create(element, click_action)
{	
	element.hint_click_action = click_action;
	element.dataset.hint = "";
}

function lw_dash_hint_button_create(parent)
{
	const hint_button  = document.createElement('div');
	hint_button.className = 'text';
	hint_button.textContent = "HINTS";
	parent.appendChild(hint_button);

	hint_button.onclick = function() {
		if (!lw_dash_hint_mode) {
			hint_overlay = lw_dash_overlay(document.body);

			lw_dash_hint_mode_enter(hint_overlay.self);

			hint_button_impostor =
				lw_dash_hint_mode_impostor(hint_button,
							   hint_overlay.self);

			hint_button_impostor.self.onclick = function() { 
				lw_dash_hint_mode_exit();
				hint_overlay.remove();
				hint_button_impostor.remove();
			};
		} else {
			hint_button_impostor.self.onclick();
		}
	}

	return hint_button;
}
</script>

<script>
/******************************************************************************
 * NETWORK
 *****************************************************************************/
class network
{
	#ws; /* Websocket */

	/* If there are no messages for certain period */
	#connection_timeout_ms = 0; /* No timeout */
	#connection_timer;
	
	#is_alive     = false;
	#is_connected = false;

	#listeners = {}; /* Objects that listen network messages */

	/* Prevents connection timeout, when timeout is set */
	#keep_alive()
	{
		clearTimeout(this.#connection_timer);
		this.#is_alive = true;

		this.#connection_timer = setTimeout(() => {
			if (this.#is_alive == true) {
				this.on_timeout();
			}

			this.#is_alive = false;

			this.#ws.close();
		}, this.#connection_timeout_ms);
	}

	#send(id, data)
	{
		console.log(this.constructor.name + '.send: ' + id + ', ' +
								data);

		this.#ws.send(JSON.stringify([ id, data ]));
	};

	#recv(data)
	{
		console.log(this.constructor.name + '.recv: ' + data);
		data = JSON.parse(data);

		/* if it contains single message */
		if (typeof (data[0]) != "object") {
			const listener = this.#listeners[data[0]];

			listener.net.recv.call(listener, data[1]);
		} else {
			/* if it contains multiple messages */
			for (var i = 0; i < data.length; i++) {
				const listener = this.#listeners[data[i][0]];

				listener.net.recv.call(listener, data[i][1]);
			};
		}

		if (this.#connection_timeout_ms > 0) {
			this.#keep_alive();
		}
	}

	_recv_test(data) { this.#recv(data) }

	/* Global events (can be overriden by user) */
	on_connect()
	{
		console.log(this.constructor.name + '.on_connect')
	};
	
	on_disconnect()
	{
		console.log(this.constructor.name + '.on_disconnect')
	};
	
	on_timeout()
	{
		console.log(this.constructor.name + '.on_timeout')
	};
	
	on_error()
	{
		console.log(this.constructor.name + '.on_error')
	};
	
	on_message(data) {
		console.log(this.constructor.name + '.on_message')
	};

	connect(ip, timeout)
	{
		this.#connection_timeout_ms = timeout;

		this.#ws = new WebSocket('ws://' + ip + '/ws');

		this.#ws.onopen = (evt) =>
		{
			this.#is_connected = true;

			if (this.#connection_timeout_ms > 0) {
				this.#keep_alive();
			}

			this.on_connect();
		};

		this.#ws.onclose = (evt) =>
		{
			if (this.#is_connected == true) {
				this.#is_connected = false;
				this.on_disconnect();
			}

			/* Destroy websocket */
			this.#ws = null;

			this.connect(ip, timeout);
		};

		this.#ws.onerror = (evt) =>
		{
			if (this.#is_connected == true) {
				this.on_error();
			}
		};
		
		this.#ws.onmessage = (evt) =>
		{
			this.on_message(evt.data)
			this.#recv(evt.data);
		};
	}

	/* Add message listener to object */
	add_listener(object, id)
	{
		const base = this;

		this.#listeners[id] = object;
		object.net = {};

		/* Can be overriden by user */
		object.net.recv = function(data) {
			console.log(id + '.dataset.net.recv: ' + data);
		};

		/* Shall NOT be overriden by user */
		object.net.send = function(data) {
			base.#send(id, data);
		};
	};

	constructor(ip, timeout)
	{
		this.connect(ip, timeout);
	}
}

/******************************************************************************
 * WIDGETS
 *****************************************************************************/
function generic_create(parent, class_name, tag)
{
	/** Head object. */
	const head     = document.createElement(tag ? tag : 'div');
	head.className = class_name;
	parent.appendChild(head);

	/** Nested objects. */
	head.click_actions   = {};
	head.hold_actions    = {};
	head.release_actions = {};
	head.keydown_actions = {};

	/** Methods. */
	head.hide = function(
	    val) { head.style.visibility = val ? "hidden" : "" };

	head.set_background = function(val) { head.style.background = val };

	head.set_text = function(val) { head.innerHTML = val };

	head.set_size = function(val) {
		if (val)
			head.style.fontSize = val + 'em';
	};

	head.set_direction = function(
	    val) { head.style.flexDirection = (val == 'h') ? 'row' : 'column' };

	head.onclick = function(e) {
		//e.stopPropagation();

		for (const key in head.click_actions)
			head.click_actions[key]();
	};

	head.onkeydown = function(e) {
		e.stopPropagation();

		for (const key in head.keydown_actions)
			head.keydown_actions[key](e.key);
	};

	const hold_event =
	    function(e) {
		e.stopPropagation();

		for (const key in head.hold_actions)
			head.hold_actions[key]();
	}

	const release_event = function(e) {
		e.stopPropagation();

		for (const key in head.release_actions)
			head.release_actions[key]();
	};

	/* Fix for mobile devices. */
	if (!head.ontouchstart)
		head.onmousedown = hold_event;
	else
		head.ontouchstart = hold_event;

	if (!head.ontouchend)
		head.onmouseup = release_event;
	else
		head.ontouchend = release_event;

	return head;
};

function field_create(parent)
{
	/** Head object. */
	const head = generic_create(parent, 'field', 'input');
	head.type  = 'text';

	/** Methods. */
	head.set_type  = function(val) { head.type = val };
	head.set_min   = function(val) { head.min = val };
	head.set_max   = function(val) { head.max = val };
	head.set_step  = function(val) { head.step = val };
	head.set_value = function(val) { head.value = val };

	return head;
};

function text_create(parent)
{
	/** Head object. */
	const head = generic_create(parent, 'text');

	return head;
};

function container_create(parent)
{
	/** Head object. */
	const head = generic_create(parent, 'lay');

	return head;
};

function pane_create(parent)
{
	/** Head object. */
	const head = generic_create(parent, 'pane');

	/** Nested objects. */
	head.caption = generic_create(head, 'pane_capt');
	head.text    = text_create(head.caption);
	head.toolbar = generic_create(head.caption, 'pane_tool');
	head.content = container_create(head);

	/** Modified classes. */
	head.text.className    = 'pane_text';
	head.content.className = 'pane_cont';

	return head;
};

function popup_create(parent)
{
	/** Head object. */
	const head = generic_create(parent, 'blur');

	/** Private objects. */
	const popup = pane_create(head);

	/** Nested objects. */
	head.caption = popup.caption;
	head.text    = popup.text;
	head.content = popup.content;

	/** Modified classes. */
	popup.classList.add('popup');

	return head;
};

function button_create(parent)
{
	/** Head object. */
	const head = text_create(parent);

	/** Modified classes. */
	head.className = 'button';

	return head;
};

function checkbox_create(parent)
{
	/** Head object. */
	const head = button_create(parent);

	/** Methods. */
	head.set_state = function(state) {
		head.state = state;

		if (state) {
			head.set_background('#113311');
			head.set_text('&#10003');
		} else {
			head.set_background('#331111');
			head.set_text('&#10007');
		};
	};

	head.click_actions.default_action =
	    function() { head.set_state(!head.state); }

	    head.set_state(head.state);
	return head;
};

function manual_input_create(parent)
{
	/** Head object. */
	const head = popup_create(document.body);
	head.text.set_text(tr('LC_POPUP_INPUT_TITLE'));

	/** Nested objects. */
	head.field  = field_create(head.content);
	head.button = button_create(head.content);
	head.button.set_text(tr('LC_BUTTON_SET'));

	/** Methods. */
	head.button.click_actions.default_action = function() { head.remove() };

	head.field.keydown_actions.default_action = function(key) {
		if (key === 'Enter')
			head.button.onclick();
	};

	return head;
};

function regulator_create(parent)
{
	/** Head object. */
	const head = container_create(parent);
	head.set_direction('h');

	/** Private objects. */
	var digits = 2;
	var format = 'numeric';
	var min	   = 0;
	var max	   = 0;
	var step   = 0;
	var value  = 0;

	var timer = 0;
	var accel = 1;
	var dir	  = 1;

	/** Nested objects. */
	head.decrement = button_create(head);
	head.decrement.set_text('<');
	head.value     = button_create(head);
	head.increment = button_create(head);
	head.increment.set_text('>');

	/** Modified classes. */
	head.classList.add('regulator');

	/** Methods. */
	head.on_change = function() {};

	head.get_value = function() { return value };

	head.set_min   = function(val) { min = val };
	head.set_max   = function(val) { max = val };
	head.set_step  = function(val) { step = val };
	head.set_value_force = function(val) {
		value = parseFloat(val);

		/** Display text depend on format. */
		if (format == 'percentage')
			head.value.set_text((value * 100).toFixed(digits) +
					    '%');
		else
			head.value.set_text(value.toFixed(digits));
	};
	head.set_value = function(val) {
		value = parseFloat(val);

		/** Validate bounds. */
		if (value > max)
			value = max;

		if (value < min)
			value = min;

		head.set_value_force(value);
	};

	head.set_format = function(fmt) {
		format = fmt;
		head.set_value_force(value);
	};

	head.manual_input = function() {
		const input = manual_input_create(head);

		input.field.set_type('number');
		input.field.set_min(min);
		input.field.set_max(max);
		input.field.set_step(step);
		input.field.set_value(value.toFixed(digits));

		input.button.click_actions.set_value = function() {
			head.set_value(input.field.value);
			head.on_change();
		};
	};

	head.accelerate = function() {
		head.set_value(value + step * dir);

		timer = setInterval(function() {
			accel += 0.5;
			clearInterval(timer);
			head.accelerate();
		}, 1000 / accel);
	};

	head.increment.hold_actions.default_action = function() {
		dir = 1;
		head.accelerate();
	};

	head.increment.release_actions.default_action = function() {
		clearInterval(timer);
		accel = 1;
		head.on_change();
	};

	head.decrement.hold_actions.default_action = function() {
		dir = -1;
		head.accelerate();
	};

	head.decrement.release_actions.default_action = function() {
		clearInterval(timer);
		accel = 1;
		head.on_change();
	};

	head.value.click_actions.default_action =
	    function() { head.manual_input() };

	return head;
};

/** Create network instance for widgets. */
var net;

const LANG = @ENV:LANG;

function tr(key, ...args) {
	let text = (LANG && LANG[key]) ? LANG[key] : key;

	if (args.length === 0) return text;

	args.forEach((arg, i) => {
		text = text.replace(`%${i + 1}`, arg);
	});

	return text;
}

try {
	// Primary attempt: Using the environment variable
	net = new network("@ENV:OTA_IP", 10000);
	console.log("init network using primary IP.");
} catch (error) {
	// Fallback attempt: Run this if the first one fails
	console.warn("primary network init failed, switching to backup...");
	net = new network("7.7.7.7", 10000);
	console.log("init network using backup IP.");
}

function loading_create(parent)
{
	return generic_create(parent, 'lds-dual-ring');
};

/* PANED REGULATOR */
function paned_regulator_create(id, parent, rmin, rmax, rstep, caption)
{
	const pane	= pane_create(parent);
	var   regulator = regulator_create(pane.content);

	pane.text.set_text(tr(caption));
	pane.content.regulator = regulator;

	regulator.set_min(rmin);
	regulator.set_max(rmax);
	regulator.set_step(rstep);
	regulator.set_value(rmin);

	net.add_listener(regulator, id);

	regulator.on_change = function() {
		regulator.net.send(regulator.get_value()) };

	regulator.net.recv = function(data) {
		pane.content.regulator.set_value_force(JSON.parse(data)) };

	return pane;
};

/* PANED CHECKBOX */
function paned_checkbox_create(id, parent, caption)
{
	const pane     = pane_create(parent);
	var   checkbox = checkbox_create(pane.content);

	pane.text.set_text(tr(caption));
	pane.content.checkbox = checkbox;

	net.add_listener(checkbox, id);

	checkbox.click_actions.send =
	    function() { checkbox.net.send(checkbox.state ? 1 : 0) };

	checkbox.net.recv = function(data) {
		checkbox.set_state(JSON.parse(data)) };

	return pane;
};

function applier_button_create(id, parent, caption, description)
{
	const button = button_create(parent);
	
	button.set_text(tr(caption));

	button.click_actions.show_dialog = function() {

		const popup = popup_create(document.body);
		popup.text.set_text(tr(caption));
		popup.content.set_direction('v');

		popup.content.set_text(tr(description));
		popup.content.style.textWrap = "auto";
		popup.content.set_text(tr(description));

		const buttons = container_create(popup.content);
		buttons.set_direction('h');
		buttons.style.width = '100%';
		buttons.style.flexFlow = 'row';

		const yes   = button_create(buttons);
		net.add_listener(yes, id);
		yes.set_text(tr('LC_CONFIRM_YES'));
		yes.click_actions.click = function() { popup.remove() };
		yes.click_actions.send	= function() { yes.net.send() };

		const no    = button_create(buttons);
		no.set_text(tr('LC_CONFIRM_NO'));
		no.click_actions.click = function() { popup.remove() };
	};

	return button;
}

/* ACTION APPLIER */
function action_applier_create(id, parent, caption, toolbar, description)
{
	const pane = pane_create(parent);
	const button = applier_button_create(id, pane.content, caption, description);

	pane.text.set_text(tr(caption));
	
	pane.toolbar.set_text(toolbar);
	pane.toolbar.set_size(2);

	pane.button = button;

	return pane;
};

/* On disconnect */
net.on_disconnect = function() {
	const p	   = popup_create(document.body);
	const t	   = text_create(p.content);
	const l	   = loading_create(p.content);
	const t2   = text_create(p.content);
	const exit = button_create(p.content);

	p.text.set_text(tr("LC_ERROR_TITLE"));
	p.content.style.alignItems = "center";
	p.content.set_direction("v");
	t.set_text(tr("LC_ERROR_NO_NETWORK"));
	t2.set_text(tr("LC_ERROR_RECONNECTING"));

	exit.set_text(tr('LC_BUTTON_HIDE_DIALOG'))
	exit.click_actions.click = function() { p.remove() };

	net.on_connect = function() { p.remove() };
}

function register_hint_dialog(parent, hint) {
	lw_dash_hint_create(parent, function() {
		const popup = popup_create(document.body);
		popup.text.set_text(tr("LC_HINT_DIALOG_TITLE"));
		popup.content.set_direction('v');

		const hint_cont = container_create(popup.content);

	});
}

/*------------------------------------------------------ Declare all widgets */
function status_widget_create(parent)
{
	const pane = pane_create(parent);
	pane.text.set_text(tr('LC_STATUS_TITLE'));
	register_hint_dialog(pane, tr("LC_HINT_STATUS"));

	/* Central subcontainer */
	const s	= container_create(pane);
	s.set_direction('h');

	/* Central (left and right) subcontainers */
	const l	= container_create(s);
	l.set_direction('v');
	l.style.alignItems = 'end';

	const r = container_create(s);
	//r.style.alignItems = 'end';
	r.set_direction('v');

	//pane.sta_title = text_create(l);
	//pane.sta_title.set_text(tr("LC_STATUS_BMS"));
	//pane.sta_title.style.alignSelf = 'center';
	pane.voltage	     = text_create(l);
	pane.current	     = text_create(l);
	pane.full_cap	     = text_create(l);
	pane.cap	     = text_create(l);
	pane.version	     = text_create(l);
	//pane.temp	     = text_create(l);
	//pane.max_input_power = text_create(l);

	//pane.veh_title = text_create(r);
	//pane.veh_title.set_text("Авто");
	//pane.veh_title.style.alignSelf = 'center';
	pane.temp            = text_create(r);
	pane.max_in_kwt      = text_create(r);
	pane.max_chg_in_kwt  = text_create(r);
	pane.min_cell        = text_create(r);
	pane.max_cell        = text_create(r);

	//pane.session_kwt   = text_create(r);
	//pane.total_kwt	   = text_create(r);
	//pane.charhing_time = text_create(r);
	//pane.time_left	   = text_create(r);

	pane.soc = text_create(pane);
	pane.soc.set_size(1.25);

	net.add_listener(pane, LEAF_CAN_FILTER_WEB_MSG_TYPE_STATUS);

	pane.net.recv = function(data) {
		const [voltage, current, full_cap, cap, version, soh,
		       temp, max_in, chg_max_in, min_cell, max_cell] = data;

		let ver_str = "invalid";

		if (version <= 3) {
			ver_str = ["unknown", "ze0", "aze0", "nv200"][version];
		}

		/* Left panel */
		pane.voltage.set_text(tr("LC_STATUS_VOLTAGE") + voltage + "V");
		pane.current.set_text(tr("LC_STATUS_CURRENT") + current + "A");
		pane.full_cap.set_text(tr("LC_STATUS_FULL_CAP") + full_cap + "kWh");
		pane.cap.set_text(tr("LC_STATUS_REMAINING_CAP") + cap + "kWh");
		pane.version.set_text(tr("LC_STATUS_BMS_VER") + version + " (" + ver_str + ")");

		pane.soc.set_text(tr("LC_STATUS_SOC") + parseInt((cap / full_cap) * 100) + "% | " +
				  tr("LC_STATUS_SOH") + parseInt(soh));

		/* Right panel */
		pane.temp.set_text(tr("LC_STATUS_BMS_TEMP")     + temp  + "C");
		pane.max_in_kwt.set_text(tr("LC_STATUS_MAX_IN") + max_in + "kWt");
		pane.max_chg_in_kwt.set_text(tr("LC_STATUS_MAX_CHG_IN") + chg_max_in + "kWt");
		//pane.min_cell.set_text(tr("LC_STATUS_MIN_CELL") + min_cell + "V");
		//pane.max_cell.set_text(tr("LC_STATUS_MAX_CELL") + max_cell + "V (d=" + parseFloat(max_cell - min_cell).toFixed(3) + ")");
	};

	return pane;
};

function capacity_panel_create(parent)
{
	const pane = pane_create(parent);
	pane.text.set_text(tr('LC_MANUAL_CAPACITY_EN'));

	register_hint_dialog(pane.caption, tr("LC_HINT_MANUAL_CAP_ENABLED"));

	const checkbox = checkbox_create(pane.caption);

	net.add_listener(checkbox, LEAF_CAN_FILTER_WEB_MSG_TYPE_CAPACITY_OVERRIDE_EN);

	pane.content.classList.toggle('is-disabled', !checkbox.state);

	checkbox.click_actions.send = function() {
		pane.content.classList.toggle('is-disabled', !checkbox.state);
		checkbox.net.send(checkbox.state ? 1 : 0)
	};

	checkbox.net.recv = function(data) {
		pane.content.classList.toggle('is-disabled', !checkbox.state);
		checkbox.set_state(JSON.parse(data));
	}

	const override = paned_regulator_create(LEAF_CAN_FILTER_WEB_MSG_TYPE_CAPACITY_OVERRIDE_KWH, pane.content, 4, 80, 4,
			       'LC_SET_CAPACITY_KWH');
	register_hint_dialog(override, tr("LC_HINT_MANUAL_CAP_OVERRIDE"));

	const full_volt = paned_regulator_create(LEAF_CAN_FILTER_WEB_MSG_TYPE_CAPACITY_FULL_VOLTAGE_V, pane.content, 350, 450, 4,
			       'LC_SET_FULL_VOLTAGE');
	register_hint_dialog(full_volt, tr("LC_HINT_MANUAL_CAP_FULL_VOLT"));

	const soc_control = soc_control_panel_create(LEAF_CAN_FILTER_WEB_MSG_SET_SOC, pane.content, 'LC_SOC_CONTROL', '&#128267');
	register_hint_dialog(soc_control, tr("LC_HINT_SOC_CTL"));

	return pane;
}

function soc_control_panel_create(id, parent, caption, toolbar)
{
	const pane = pane_create(parent);

	pane.text.set_text(tr(caption));
	pane.toolbar.set_text(toolbar);
	pane.toolbar.set_size(2);

	/* Set soc to 100% */
	const soc_rst = applier_button_create(LEAF_CAN_FILTER_WEB_MSG_RESET_SOC, pane.content, 'LC_RESET_SOC_TITLE', 'LC_RESET_SOC_CONFIRM');

	/* Manual soc reset button */
	const button = button_create(pane.content);
	button.set_text(tr('LC_SET_SOC_TITLE'));

	button.click_actions.show_dialog = function() {
		const popup = popup_create(document.body);
		popup.text.set_text(tr('LC_SET_SOC_TITLE'));
		popup.content.set_direction('v');

		popup.content.set_text(tr('LC_SET_SOC_DESC'));
		popup.content.style.textWrap = "auto";

		const regulator = regulator_create(popup.content);
		regulator.set_min(0);
		regulator.set_max(100);
		regulator.set_step(5);
		regulator.set_value(50);

		const buttons = container_create(popup.content);
		buttons.set_direction('h');
		buttons.style.width = '100%';
		buttons.style.flexFlow = 'row';

		const yes   = button_create(buttons);
		const no    = button_create(buttons);

		net.add_listener(yes, id);
		yes.set_text(tr('LC_CONFIRM_YES'));
		yes.click_actions.click = function() { popup.remove() };
		yes.click_actions.send	= function() { yes.net.send(regulator.get_value()) };

		no.set_text(tr('LC_CONFIRM_NO'));
		no.click_actions.click = function() { popup.remove() };
	};

	return pane;
};

function soh_control_panel_create(parent, caption, toolbar)
{
	const pane = pane_create(parent);
	register_hint_dialog(pane, tr("LC_HINT_SOH_CTL"));

	pane.text.set_text(tr(caption));
	pane.toolbar.set_text(toolbar);
	pane.toolbar.set_size(2);

	paned_regulator_create(LEAF_CAN_FILTER_WEB_MSG_TYPE_SOH_MULTIPLIER, pane.content, 0.0, 3.0, 0.1,
			      'LC_SOH_MULTIPLIER');

	/* Action applier with status (awful...) */
	let a = action_applier_create(LEAF_CAN_FILTER_WEB_MSG_TYPE_SOH_RESET, pane.content, 'LC_RESET_SOH_TITLE', '&#10227',
			      'LC_RESET_SOH_WARNING');
	net.add_listener(a.toolbar, LEAF_CAN_FILTER_WEB_MSG_TYPE_SOH_RESET_STAT);
	a.toolbar.net.recv = function(data) {
		const stat = parseInt(data);

		let stat_str = "unknown";

		if (stat <= 4) {
			stat_str = ["stopped", "active", "succeed", "failed", "timeout"][stat];
		}

		a.toolbar.set_text('(' + stat_str + ') ' + '&#10227');
	};
	a.toolbar.set_size(1.5);

	return pane;
}
